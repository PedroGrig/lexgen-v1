version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lexgen-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"
    networks:
      - lexgen-network

  ollama:
    image: ollama/ollama:latest
    container_name: lexgen-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    networks:
      - lexgen-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Puxa o modelo automaticamente após o Ollama subir
  ollama-init:
    image: ollama/ollama:latest
    container_name: lexgen-ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - lexgen-network
    entrypoint: >
      sh -c "OLLAMA_HOST=http://ollama:11434 ollama pull qwen2.5:3b"

  backend:
    build: ./backend
    container_name: lexgen-backend
    restart: unless-stopped
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=qwen2.5:3b
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
      - USER_PASS=${USER_PASS}
    expose:
      - "8000"
    depends_on:
      - qdrant
      - ollama
    networks:
      - lexgen-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: lexgen-frontend
    restart: always
    environment:
      - API_URL=http://backend:8000
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lexgen-network
      - coolify  # necessário para o Traefik do Coolify enxergar o container
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lexgen.rule=Host(`lexgen.ggvadv.com`)"
      - "traefik.http.routers.lexgen.entrypoints=https"
      - "traefik.http.routers.lexgen.tls=true"
      - "traefik.http.routers.lexgen.tls.certresolver=letsencrypt"
      - "traefik.http.services.lexgen.loadbalancer.server.port=3000"

volumes:
  qdrant_data:
  ollama_data:

networks:
  lexgen-network:
    driver: bridge
  coolify:
    external: true  # rede gerenciada pelo Coolify/Traefik
